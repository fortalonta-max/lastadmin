services:
  - type: web
    name: nyc-cookies
    env: node
    plan: starter
    # VITE_* variables are embedded at build time, so they MUST be set
    # as environment variables before the build runs (not just at runtime).
    # All variables here must also be set on the Railway dashboard when
    # deploying to Railway.
    buildCommand: npm install && npm run build
    startCommand: node dist/server/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      # ── Supabase ────────────────────────────────────────────────────────────
      # Public config — embedded at build time by Vite (VITE_ prefix required)
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      # Service role key — SECRET, server-side only (no VITE_ prefix keeps it
      # out of the client bundle). Required for checkout and all admin routes.
      # Without this, placeOrder and every admin server function will crash.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # ── Session ─────────────────────────────────────────────────────────────
      - key: SESSION_SECRET
        sync: false
